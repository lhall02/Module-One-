<div class="container mt-4">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h2 class="mb-0">Trips</h2>
    <a class="btn btn-primary" routerLink="/trips/add">Add Trip</a>
  </div>

  <div *ngIf="loading" class="alert alert-info">Loading trips...</div>
  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div class="row g-3" *ngIf="!loading && trips.length">
    <div class="col-md-6 col-lg-4" *ngFor="let trip of trips">
      <app-trip-card [trip]="trip" (deleted)="handleDeleted()"></app-trip-card>
    </div>
  </div>

  <div *ngIf="!loading && !trips.length" class="alert alert-warning">
    No trips found.
  </div>
</div>
